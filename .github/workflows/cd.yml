name: CD - Deploy to Kubernetes

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/worknomads

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, linux, k8s]
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Preflight kubeconfig secret requirements
        shell: bash
        run: |
          echo "Deploy environment: production"
          echo "Expected secret names: KUBECONFIG (preferred), KUBE_CONFIG (fallback)"
          echo "Recommended location: GitHub Environment secret (production)"
          echo "Accepted format: full kubeconfig YAML (multi-line supported)"

      - name: Resolve kubeconfig
        id: kubeconfig
        shell: bash
        env:
          KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG }}
          KUBE_CONFIG_SECRET: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -n "$KUBECONFIG_SECRET" ]; then
            KCFG="$KUBECONFIG_SECRET"
            SOURCE="KUBECONFIG"
          else
            KCFG="$KUBE_CONFIG_SECRET"
            SOURCE="KUBE_CONFIG"
          fi

          if [ -z "$KCFG" ]; then
            echo "::error::Missing kubeconfig secret for production deploy."
            echo "::error::Set KUBECONFIG (preferred) or KUBE_CONFIG in GitHub Environment: production."
            exit 1
          fi

          echo "::notice::Using ${SOURCE} secret for kubectl context."
          {
            echo "kubeconfig<<EOF"
            echo "$KCFG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Helm
        uses: azure/setup-helm@v4

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ steps.kubeconfig.outputs.kubeconfig }}

      - name: Preflight cluster connectivity
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking access to cluster API server..."
          kubectl cluster-info
          kubectl get namespace worknomads >/dev/null 2>&1 || echo "Namespace worknomads not found yet (will be created)."

      - name: Apply namespace and config
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/infra/configmap.yaml

      - name: Install or upgrade KEDA
        shell: bash
        run: |
          set -euo pipefail
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm upgrade --install keda kedacore/keda \
            --namespace keda \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Verify KEDA CRDs and controller health
        shell: bash
        run: |
          set -euo pipefail
          kubectl get crd scaledobjects.keda.sh >/dev/null
          kubectl wait --for=condition=available deployment/keda-operator -n keda --timeout=180s
          kubectl get pods -n keda

      - name: Apply secrets guidance
        shell: bash
        run: |
          echo "Secrets should be managed via Sealed Secrets or External Secrets Operator."
          echo "Run: kubectl apply -f k8s/infra/secrets.yaml  (DO NOT commit real values)"

      - name: Update image tags in manifests
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.TAG }}"
          SERVICES="auth-service submission-service classifier-service admin-service api-gateway"
          for svc in $SERVICES; do
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${svc}:${TAG}"
            sed -i "s|ghcr.io/YOUR_ORG/worknomads-${svc}:latest|${IMAGE}|g" "k8s/${svc}/deployment.yaml"
          done

      - name: Deploy services
        shell: bash
        run: |
          set -euo pipefail
          for svc in auth-service submission-service classifier-service admin-service api-gateway; do
            kubectl apply -f "k8s/${svc}/"
          done

      - name: Apply ingress
        shell: bash
        run: kubectl apply -f k8s/api-gateway/ingress.yaml

      - name: Wait for rollouts
        shell: bash
        run: |
          set -euo pipefail
          for svc in auth-service submission-service classifier-service admin-service api-gateway; do
            kubectl rollout status "deployment/${svc}" -n worknomads --timeout=180s
          done

      - name: Verify deployment
        shell: bash
        run: kubectl get pods -n worknomads
