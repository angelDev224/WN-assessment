name: CD - Deploy to Kubernetes

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/worknomads

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, linux, k8s]
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Derive lowercase image prefix
        id: image-prefix
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "value=${OWNER_LC}/worknomads" >> "$GITHUB_OUTPUT"

      - name: Preflight kubeconfig secret requirements
        shell: bash
        run: |
          echo "Deploy environment: production"
          echo "Expected secret names: KUBECONFIG (preferred), KUBE_CONFIG (fallback)"
          echo "Recommended location: GitHub Environment secret (production)"
          echo "Accepted format: full kubeconfig YAML (multi-line supported)"

      - name: Resolve kubeconfig
        id: kubeconfig
        shell: bash
        env:
          KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG }}
          KUBE_CONFIG_SECRET: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -n "$KUBECONFIG_SECRET" ]; then
            KCFG="$KUBECONFIG_SECRET"
            SOURCE="KUBECONFIG"
          else
            KCFG="$KUBE_CONFIG_SECRET"
            SOURCE="KUBE_CONFIG"
          fi

          if [ -z "$KCFG" ]; then
            echo "::error::Missing kubeconfig secret for production deploy."
            echo "::error::Set KUBECONFIG (preferred) or KUBE_CONFIG in GitHub Environment: production."
            exit 1
          fi

          echo "::notice::Using ${SOURCE} secret for kubectl context."
          {
            echo "kubeconfig<<EOF"
            echo "$KCFG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Helm
        uses: azure/setup-helm@v4

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ steps.kubeconfig.outputs.kubeconfig }}

      - name: Preflight cluster connectivity
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking namespace-scoped Kubernetes access..."
          kubectl auth can-i get pods -n worknomads
          kubectl get namespace worknomads >/dev/null 2>&1 || echo "Namespace worknomads not found yet (will be created)."

      - name: Apply namespace and config
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/infra/configmap.yaml

      - name: Install or upgrade KEDA
        shell: bash
        run: |
          set -euo pipefail
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm upgrade --install keda kedacore/keda \
            --namespace keda \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Verify KEDA CRDs and controller health
        shell: bash
        run: |
          set -euo pipefail
          kubectl get crd scaledobjects.keda.sh >/dev/null
          kubectl wait --for=condition=available deployment/keda-operator -n keda --timeout=180s
          kubectl get pods -n keda

      - name: Create or update worknomads runtime secret
        shell: bash
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for secret_name in POSTGRES_PASSWORD JWT_SECRET_KEY RABBITMQ_PASSWORD MINIO_SECRET_KEY; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required GitHub Environment secret: ${secret_name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Populate required secrets in GitHub Environment: production."
            exit 1
          fi

          kubectl -n worknomads create secret generic worknomads-secrets \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --from-literal=JWT_SECRET_KEY="${JWT_SECRET_KEY}" \
            --from-literal=RABBITMQ_PASSWORD="${RABBITMQ_PASSWORD}" \
            --from-literal=MINIO_SECRET_KEY="${MINIO_SECRET_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply secrets guidance (optional)
        shell: bash
        run: |
          echo "CD now creates/updates worknomads-secrets from GitHub Environment secrets."
          echo "For Sealed Secrets / External Secrets setups, adapt this workflow or replace this step."

      - name: Update image tags in manifests
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.TAG }}"
          SERVICES="auth-service submission-service classifier-service admin-service api-gateway"
          for svc in $SERVICES; do
            IMAGE="${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-${svc}:${TAG}"
            sed -i "s|ghcr.io/YOUR_ORG/worknomads-${svc}:latest|${IMAGE}|g" "k8s/${svc}/deployment.yaml"
          done

      - name: Deploy services
        shell: bash
        run: |
          set -euo pipefail
          for svc in auth-service submission-service classifier-service admin-service api-gateway; do
            kubectl apply -f "k8s/${svc}/"
          done

      - name: Apply ingress
        shell: bash
        run: kubectl apply -f k8s/api-gateway/ingress.yaml

      - name: Wait for rollouts
        shell: bash
        run: |
          set -euo pipefail
          for svc in auth-service submission-service classifier-service admin-service api-gateway; do
            if ! kubectl rollout status "deployment/${svc}" -n worknomads --timeout=600s; then
              echo "::error::Rollout failed for deployment/${svc}. Collecting diagnostics..."
              kubectl get pods -n worknomads -o wide || true
              kubectl describe deployment "${svc}" -n worknomads || true
              kubectl describe pods -n worknomads -l "app=${svc}" || true
              kubectl logs -n worknomads "deployment/${svc}" --tail=200 || true
              kubectl get events -n worknomads --sort-by=.lastTimestamp | tail -n 50 || true
              exit 1
            fi
          done

      - name: Verify deployment
        shell: bash
        run: kubectl get pods -n worknomads
